<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biddo - Editar Producto</title>
    <link rel="stylesheet" href="../CSS/mimonedero.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-box { max-width: 550px; padding: 35px; }
        .field-hint {
            font-size: 0.75rem;
            color: var(--text-dim, #94a3b8);
            margin-top: 4px;
            margin-left: 4px;
        }
        .char-counter {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-dim, #94a3b8);
            margin-top: 4px;
        }
        #mensaje-status {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.2em;
        }
        .image-upload-area {
            border: 2px dashed rgba(151, 74, 222, 0.4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 8px;
        }
        .image-upload-area:hover {
            border-color: var(--accent-purple, #974ade);
            background: rgba(151, 74, 222, 0.05);
        }
        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <a href="gestionar-productos.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Volver a Gestionar Productos
        </a>

        <div class="login-box glass-form">
            <div class="login-header">
                <h2>Editar Producto</h2>
                <p>Modifica los datos de tu publicación</p>
            </div>

            <form id="form-editar-producto">
                <div class="input-group">
                    <label for="imagen-producto">Imagen del producto</label>
                    <div class="image-upload-area" id="upload-area">
                        <i class="fa-solid fa-camera" style="font-size:1.5rem; color:#974ade; margin-bottom:8px;"></i>
                        <p style="font-size:0.85rem; color:var(--text-dim); margin:0;">Haz clic para cambiar la imagen</p>
                        <input type="file" id="imagen-producto" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
                        <img id="preview-imagen" class="image-preview" alt="Vista previa">
                    </div>
                    <span class="field-hint">Obligatoria si el producto no tiene imagen</span>
                </div>

                <div class="input-group">
                    <label for="nombre-producto">Nombre del producto</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <input type="text" id="nombre-producto" placeholder="Ej: Zapatillas Air Force 1" maxlength="150" required>
                    </div>
                    <span class="field-hint">Mínimo 3 caracteres, máximo 150</span>
                </div>

                <div class="input-group">
                    <label for="categoria">Categoría</label>
                    <div class="input-wrapper select-wrapper">
                        <select id="categoria" required>
                            <option value="">Selecciona una categoría</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="descripcion">Descripción</label>
                    <div class="input-wrapper" style="align-items: flex-start;">
                        <i class="fa-solid fa-align-left" style="margin-top: 12px;"></i>
                        <textarea id="descripcion" rows="4" placeholder="Describe tu producto: estado, características, etc." maxlength="1000" required></textarea>
                    </div>
                    <div class="char-counter"><span id="desc-counter">0</span>/1000</div>
                </div>

                <div class="input-group">
                    <label for="precio-bdc">Precio (BDC)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-coins"></i>
                        <input type="number" id="precio-bdc" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                    <span class="field-hint">El precio debe ser mayor a 0 BDC</span>
                </div>

                <button type="submit" class="login-submit" id="btn-guardar">Guardar Cambios</button>
            </form>

            <div id="mensaje-status"></div>
        </div>

        <div class="glow-effect"></div>
    </div>

    <script type="module" src="../JS/editar-producto.js"></script>
</body>
</html>

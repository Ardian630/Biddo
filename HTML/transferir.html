<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biddo - Transferir Fondos</title>
    <link rel="stylesheet" href="../CSS/mimonedero.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-box { max-width: 550px; padding: 35px; }
        .search-results-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }
        .user-found-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-found-info { font-size: 0.9rem; color: #fff; }
        .user-found-info span { display: block; color: var(--text-muted); font-size: 0.8rem; }
        .btn-small {
            background: var(--accent-purple, #974ade);
            color: #fff; border: none; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-small:disabled { opacity: 0.5; cursor: not-allowed; }
        .contacts-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .contacts-content {
            background: #111; border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; border-radius: 16px; width: 90%; max-width: 400px;
        }
        .contacts-list-ul {
            list-style: none; padding: 0; margin: 15px 0; max-height: 200px; overflow-y: auto;
        }
        .contacts-list-ul li {
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .contacts-list-ul li:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="container login-container">
        <a href="mimonedero.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Volver al Monedero
        </a>

        <div class="login-box glass-form">
            <div class="login-header">
                <h2>Transferir BDC</h2>
                <p>Envía fondos al instante a otros usuarios de la red</p>
            </div>

            <div class="input-group" style="margin-bottom: 10px;">
                <label>Buscar Beneficiario</label>
                <div class="input-wrapper" style="display: flex; gap: 10px;">
                    <i class="fa-solid fa-user-search" style="margin-top: 13px;"></i>
                    <input type="text" id="input-buscar" placeholder="Nombre de usuario o Cédula..." style="flex: 1;">
                    <button type="button" id="btn-buscar" class="btn-small" style="height: 45px; padding: 0 15px;"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>

            <div style="text-align: right; margin-bottom: 15px;">
                <button type="button" id="btn-abrir-contactos" class="btn-small" style="display: inline-flex;"><i class="fa-solid fa-address-book"></i> Mis Contactos</button>
            </div>

            <div id="search-results" class="search-results-box">
                <div class="user-found-card">
                    <div class="user-found-info">
                        <strong id="res-nombre">---</strong>
                        <span id="res-detalles">@username • C.I: ---</span>
                    </div>
                    <button type="button" id="btn-agregar-contacto" class="btn-small"><i class="fa-solid fa-user-plus"></i> Guardar</button>
                </div>
            </div>

            <form id="form-transferir">
                <div class="input-group">
                    <label for="input-monto">Monto a Enviar (BDC)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-coins"></i>
                        <input type="number" id="input-monto" step="0.01" placeholder="0.00" min="0.01" required>
                    </div>
                    <small id="txt-comision" style="color: var(--text-muted); display:block; margin-top:5px; font-size:0.8rem;">Comisión de red: 0.00%</small>
                    <small id="txt-total-deducir" style="color: var(--error-red, #f87171); display:block; margin-top:2px; font-size:0.8rem; font-weight: 600;"></small>
                </div>

                <button type="submit" class="login-submit" id="btn-submit-transferencia" disabled style="margin-top: 20px;">Confirmar y Transferir</button>
            </form>

            <div id="mensaje-status" style="text-align: center; margin-top: 15px; display: none; font-size: 0.95rem; padding: 10px; border-radius: 8px;"></div>
        </div>
    </div>

    <div id="modal-contactos" class="contacts-modal">
        <div class="contacts-content">
            <h3><i class="fa-solid fa-address-book"></i> Mis Contactos</h3>
            <ul id="lista-contactos" class="contacts-list-ul">
                </ul>
            <button type="button" id="btn-cerrar-modal" class="login-submit" style="background: #333; margin-top: 10px; padding: 8px;">Cerrar</button>
        </div>
    </div>

    <script type="module" src="../JS/transferir.js"></script>
</body>
</html>

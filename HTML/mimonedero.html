<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biddo - Inicio</title>
    <link rel="stylesheet" href="../CSS/mimonedero.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">Biddo<span class="Biddo-Dot">.</span></div>
    
            <!-- Mantenemos tus opciones intactas -->
            <ul>
                <li><a href="../HTML/2inicio.html" class="anchors">Inicio</a></li>
                <li id="nav-monedero"><a href="../HTML/mimonedero.html" class="anchors active">Monedero</a></li>
                <li id="nav-mercado"><a href="../HTML/mercado.html" class="anchors">Mercado</a></li>
                <li id="nav-subastas"><a href="../HTML/subastas.html" class="anchors">Subasta</a></li>
                <li id="nav-admin-ops" style="display: none;"></li>
            </ul>
        
            <!-- Nuevo contenedor de autenticación dinámica -->
            <div class="nav-auth-container">
                <!-- Se muestra por defecto si no hay sesión -->
                <button class="btn-contact" id="btn-login-ui">Iniciar Sesión</button>
            
                <!-- Se muestra solo si el usuario está logueado -->
                <div id="user-menu" class="user-dropdown-wrapper" style="display: none;">
                    <div class="user-profile-trigger">
                        <div class="user-info-text">
                            <span class="user-welcome">Hola,</span>
                            <span id="user-name-label" class="user-name">Cargando...</span>
                        </div>
                        <div class="avatar-circle">
                            <!--<i class="fa-solid fa-user"></i>-->
                            <img id="user-avatar-nav" src="../assets/img/user1.jpeg" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        </div>
                    </div>
                    
                    <!-- Menú desplegable -->
                    <ul class="user-dropdown-menu">
                        <li><a href="perfil.html">Mi Perfil</a></li>
                        <li><a href="ajustes.html">Ajustes</a></li>
                        <li class="divider"></li>
                        <li><a href="#" id="btn-logout" class="logout-link">Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <h1>Mi Monedero</h1>
        
        <main class="Main-section">
            <section class="balance-main">
                <div class="balance-contain">
                    <span class="label">Saldo disponible ⓘ</span>
                    <h2 id="btc-disponibles">0.00 <span class="bdc_unity">BDC</span></h2>
                </div>
                <div class="balance-contain">
                    <span class="label">Saldo Retenido ⓘ</span>
                    <h2 id="btc-retenido">0.00 <span class="bdc_unity">BDC</span></h2>
                </div>
            </section>
            
            <section class="card-box">
                <div class="card" id="biddo-card">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-top">
                                <span class="brand">Biddo<b>.</b></span>
                                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="MC" width="45">
                            </div>
                            <div class="card-number" id="tarjeta-numero">•••• •••• •••• 3294</div>
                            <div class="card-bottom">
                                <div class="info">
                                    <span class="label">Titular</span>
                                    <span class="val" id="tarjeta-titular">Cargando...</span>
                                </div>
                                <div class="info">
                                    <span class="label">Fecha Exp.</span>
                                    <span class="val" id="tarjeta-fecha">••/••</span>
                                </div>
                                <button class="btn-reveal" onclick="toggleCardInfo()">Ver Datos</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glow-effect"></div>
            </section>
        </main>

        <section class="actions">
            <button class="action-btn" id="btn-ir-recarga">
                <div class="icon-circle">
                    <i class="fa-solid fa-circle-arrow-down"></i>
                </div>
                <span>Recargar</span>
            </button>
            <button class="action-btn" id="btn-ir-transferir">
                <div class="icon-circle">
                    <i class="fa-solid fa-paper-plane"></i>
                </div>
                <span>Transferir</span>
            </button>
            <button class="action-btn" id="btn-ir-retiro">
                <div class="icon-circle">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <span>Retirar</span>
            </button>
        </section>

        <section class="history">
            <h2>Movimientos</h2>
    
            <div class="transactions-list">
            </div>
        </section>
    </div>
    <script type="module" src="../JS/auth-header.js"></script>
    <script type="module" src="../JS/mimonedero.js"></script>
    <script>
        let hidden = true;
        function toggleCardInfo() {
        // Esta función ahora solo dispara un evento que escucharemos en mimonedero.js
            window.dispatchEvent(new CustomEvent('toggle-tarjeta'));
        }
    </script>
</body>
</html>

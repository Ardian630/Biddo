<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biddo - Iniciar Sesión</title>
    <link rel="stylesheet" href="../CSS/mimonedero.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container login-container">
        <a href="2inicio.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>

        <div class="login-box">
            <div class="login-header">
                <div class="logo">Biddo<span>.</span></div>
                <p class="subtitle">Bienvenido de nuevo a la red</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="ejemplo@biddo.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <div class="checkmark"></div>
                        <span class="label-text">Recordarme</span>
                    </label>
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-submit">Ingresar</button>
            </form>

            <div class="login-footer">
                <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>

        <div class="glow-effect"></div>
    </div>
    <script type="module" src="../JS/login.js"></script>
    <!-- Al final del body de tu register.html o login.html -->
    <script type="module">
        import { supabase } from '../JS/supabaseClient.js';

    // Prueba rápida de conexión
        async function testConnection() {
            const { data, error } = await supabase.from('usuarios_perfil').select('count');
            if (error) {
                console.error('Error al conectar con la tabla Usuario:', error.message);
            } else {
                console.log('Conexión verificada. Tabla Usuario accesible.');
            }
        }

        testConnection();
    </script>
</body>
</html>
